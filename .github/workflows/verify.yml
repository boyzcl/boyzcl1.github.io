name: Verify

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  static-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check static site
        run: python3 scripts/check_static_site.py
